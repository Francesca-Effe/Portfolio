
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="css/projects.css">
</head>
<body>
    <section class="projects-section">
        <div class="projects-container">
            <div class="projects-top-page">
                <a href="index.html"><img src="images/AvatarFra.png" alt="logo" class="avatar"></a>
                <img src="images/LifeBars.png" alt="lifebar" class="lifebar">
            </div>
            <div class="projects-content">

                <!-- left content -->
                <div class="projects-content-left">
                    <div class="holder-backpack">
                        <img src="./images/SELECT BUTTON Project.png" alt="select" class="select-image select-backpack ">
                        <a href="projects-details.html"><img src="images/BACKPACK.png" alt="backpack" class="backpack">
                        </a>
                    </div>    
                    <div class="holder-frame-backpack">
                        <img src="images/PROJECTS_Holder.png" alt="projects-frame-holder" class="backpack-frame"> 
                    </div>    
                    <div class="holder-shovel">
                        <img src="./images/SELECT BUTTON Project.png" alt="select" class="select-image select-shovel ">
                        <a href="tools.html"><img src="images/SHOVEL.png" alt="shovel" class="shovel"></a>
                    </div>    
                    <div class="holder-frame-shovel">
                        <img src="images/TOOLS_Holder.png" alt="tool-frame-holder" class="shovel-frame"> 
                    </div>    
                    <div class="holder-gear">
                        <img src="./images/SELECT BUTTON Project.png" alt="select" class="select-image select-gear ">
                        <a href="skills.html"><img src="images/ENGRENAGE.png" alt="gear" class="gear"></a>
                    </div>    
                    <div class="holder-frame-gear">
                        <img src="images/SKILLZ_Holder.png" alt="skills-frame-holder" class="gear-frame"> 
                    </div>    
                </div>
                <!-- center content -->
                <div class="projects-content-center">
                  <div class="buttons-container">
                    <div class="button-top-left">
                        <a href="aboutme.html"> <button class="button-left">ABOUT ME</button></a>
                    </div>
                    <div class="button-top-right">
                        <a href="contact.html"> <button class="button-right">CONTACT</button></a>
                    </div>
                  </div>
                  <div class="carousel-container">
                    <div class="carousel-background">
                        <div class="carousel-viewport">
                          <div class="carousel-videos">
                            <video muted loop autoplay preload="none">
                                <source src="./images/Drop_Website_Projects.webm" type="video/webm">
                            </video>
                            <video muted loop autoplay preload="none">
                                <source src="./images/Drop_Website_Projects.webm" type="video/webm">
                            </video>
                            <video muted loop autoplay preload="none">
                                <source src="./images/Drop_Website_Projects.webm" type="video/webm">
                            </video>
                            <video muted loop autoplay preload="none">
                                <source src="./images/Drop_Website_Projects.webm" type="video/webm">
                            </video>
                          </div>  
                        </div>
                    </div>
                  </div>  
                </div>
                <!-- right content -->
                 <div class="projects-content-right">
                    <video class="avatar-right" muted loop autoplay preload="none">
                        <source src="./images/Website_Chipolata_Idle_TALKING.webm" type="video/webm">
                    </video>
                 </div>
            </div>
        </div>
    </section>
  <script src="app.js"></script>  
</body>
</html>
